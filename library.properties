sentence=Music theory engine for embedded systems.
paragraph=Notes, intervals, chords, scales, harmonic fields, harmonic trees, progression analysis, fretboard engine, real-time harmonic monitor, events and sequences. Stateless output adapters serialize musical structures to MIDI 1.0 bytes and MIDI 2.0 UMP Flex Data. Transport (UART parsing, UMP dispatch, MIDI-CI) is delegated to dedicated libraries such as midi2_cpp. Zero-heap C++11, PROGMEM tables, tier-based compilation. Ported from gingopy.
